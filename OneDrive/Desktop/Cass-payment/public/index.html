<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Fees – G10 Educational Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #4CAF50;
      color: #fff;
      border-radius: 5px;
      margin-top: 15px;
    }
    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>G10 Educational Platform</h2>
  <p>Pay Tuition Fee – 365 Days Access</p>
  <button id="payBtn">Pay Now</button>
</div>

<!-- Cashfree SDK -->
<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

<script>
  // Initialize Cashfree
  const cashfree = Cashfree({
    mode: "sandbox" // change to "production" when live
  });

  document.getElementById("payBtn").onclick = function () {

    // This MUST come from your backend after creating order
    const paymentSessionId = "110642715e14725da35458a79777246011";

    cashfree.checkout({
      paymentSessionId: paymentSessionId,
      redirectTarget: "_self"
    });
  };
</script>

</body>
</html>
