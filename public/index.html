<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Access</title>
<link rel="stylesheet" href="/style.css">
<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6fb;
  padding:20px;
}

h2{
  text-align:center;
}

.class-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap:12px;
  margin-bottom:20px;
}

.class-btn{
  background:#2c3e50;
  color:white;
  padding:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.class-btn:hover{
  background:#34495e;
}

.sub-grid{
  display:none;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.sub-btn{
  background:#3498db;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.sub-btn.study{ background:#27ae60; }
.sub-btn.practice{ background:#e67e22; }

.sub-btn:disabled{
  background:#bdc3c7;
  cursor:not-allowed;
}

#email{
  font-size:18px;
  color:green;
  font-weight:bold;
  text-align:center;
}

#message{
  text-align:center;
  color:red;
  font-weight:bold;
  margin-top:10px;
}
  #message{
  white-space: pre-line;
}







.container{
  display:flex;
  gap:20px;
}

.left{
  flex:3;
}

#rightPanel{
  flex:1;
  display:none;
  flex-direction:column;
  gap:10px;
}

.right-btn{
  background:#8e44ad;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.right-btn:hover{
  background:#9b59b6;
}











</style>
</head>

<body>






<h2>Email Access Portal</h2>

<div class="container">

  <!-- LEFT SIDE (existing content) -->
  <div class="left">

    <!-- CLASS BUTTONS -->
    <div class="class-grid">
      <button class="class-btn" onclick="showClass('class9')">Class 9</button>
      <button class="class-btn" onclick="showClass('class10')">Class 10</button>
      <button class="class-btn" onclick="showClass('class11')">Class 11</button>
      <button class="class-btn" onclick="showClass('class12')">Class 12</button>
      <button class="class-btn" onclick="showClass('iitjee')">IIT-JEE</button>
      <button class="class-btn" onclick="showClass('neet')">NEET</button>
    </div>

    <!-- SUBJECT BUTTONS -->
    <div id="subjects" class="sub-grid"></div>

    <p id="email"></p>
    <p id="message"></p>

  </div>

  <!-- RIGHT SIDE PANEL -->
  <div id="rightPanel">
    <button class="right-btn" onclick="openLink('class9')">Class 9 </button>
    <button class="right-btn" onclick="openLink('class10')">Class 10 </button>
    <button class="right-btn" onclick="openLink('class11')">Class 11 </button>
    <button class="right-btn" onclick="openLink('class12')">Class 12 </button>
    <button class="right-btn" onclick="openLink('iitjee')">IIT-JEE </button>
    <button class="right-btn" onclick="openLink('neet')">NEET </button>
    <button class="right-btn" onclick="goHome()">🏠 Home</button>
  </div>

</div>











<!-- SUBJECT BUTTONS -->
<div id="subjects" class="sub-grid"></div>

<p id="email"></p>
<p id="message"></p>

<script>
let alreadyUsed = false;

const classButtons = document.querySelectorAll(".class-btn");

const data = {
  class9: [
    {id:"class9_science_practice", label:"Science – Study Materials + Practice Test", type:"practice"},
   
    {id:"class9_math_practice", label:"Math – Study Materials + Practice Test", type:"practice"},
  
  ],
  class10: [
    {id:"class10_science_practice", label:"Science – Study Materials + Practice Test", type:"practice"},
    
    {id:"class10_math_practice", label:"Math – Study Materials + Practice Test", type:"practice"},
    
  ],
  class11: [
    {id:"class11_physics_practice", label:"Physics – Study Materials + Practice Test", type:"practice"},
   
    {id:"class11_chemistry_practice", label:"Chemistry – Study Materials + Practice Test", type:"practice"},
  
    {id:"class11_math_practice", label:"Math – Study Materials + Practice Test", type:"practice"},
  
    {id:"class11_biology_practice", label:"Biology – Study Materials + Practice Test", type:"practice"},
   
  ],
  class12: [
    {id:"class12_physics_practice", label:"Physics – Study Materials + Practice Test", type:"practice"},
    
    {id:"class12_chemistry_practice", label:"Chemistry – Study Materials + Practice Test", type:"practice"},
  
    {id:"class12_math_practice", label:"Math – Study Materials + Practice Test", type:"practice"},
    
    {id:"class12_biology_practice", label:"Biology – Study Materials + Practice Test", type:"practice"},
 
  ],
  iitjee: [
    {id:"iitjee_physics_practice", label:"Physics – Study Materials + Practice Test", type:"practice"},
    
    {id:"iitjee_chemistry_practice", label:"Chemistry – Study Materials + Practice Test", type:"practice"},
  
    {id:"iitjee_math_practice", label:"Math – Study Materials + Practice Test", type:"practice"},

  ],
  neet: [
    {id:"neet_physics_practice", label:"Physics – Study Materials + Practice Test", type:"practice"},
  
    {id:"neet_chemistry_practice", label:"Chemistry – Study Materials + Practice Test", type:"practice"},
    
    {id:"neet_biology_practice", label:"Biology – Study Materials + Practice Test", type:"practice"},
  
  ]
};

function showClass(cls){
  if(alreadyUsed) return;

  const box = document.getElementById("subjects");
  box.innerHTML = "";
  box.style.display = "grid";

  data[cls].forEach(s=>{
    const b = document.createElement("button");
    b.className = `sub-btn ${s.type}`;
    b.innerText = s.label;
    b.onclick = ()=>getEmail(s.id);
    box.appendChild(b);
  });
}

function getEmail(category){
  if(alreadyUsed) return;

  fetch(`https://sm-practice-test-email.onrender.com/email?category=${category}`)
    .then(r=>r.json())
    .then(d=>{
      document.getElementById("email").innerText = d.email || d.message;
    document.getElementById("message").innerHTML =
  "⚠️ You have permission for only one registered email.<br><br>" +
  "📌 Copy or note the password (email) immediately.<br>" +
  "⏳ After 5 minutes, self-destruction mode will activate and the password will disappear.<br>" +
  "📅 This password remains valid for 366 days (1 year).<br><br>" +
  "<span style='color:blue; font-weight:bold;'>🔑 This email is your registered ID to open the practice test for your respective class.</span>";

      // 🔒 Disable ALL buttons
      document.querySelectorAll(".sub-btn").forEach(b=>b.disabled=true);
      classButtons.forEach(b=>b.disabled=true);

      alreadyUsed = true;
	  
	  
	  
	  
	  
	  
	  
	  
	  
	  // ✅ SHOW RIGHT PANEL
document.getElementById("rightPanel").style.display = "flex";
	  
	  
	  
	  
	  
	  
	  
	  
	  

      // ⏱ START TIMER AFTER EMAIL
      setTimeout(() => {
        alert("Session expired");
        location.reload();
      }, 5 * 60 * 1000);
    })
    .catch(()=>{
      document.getElementById("message").innerText = "Server error";
    });
}












function openLink(type){
  // 👉 Put your real external links here
  const links = {
    class9: "https://gten-educational-platform.github.io/Class-12/class 9 button.html",
    class10: "https://gten-educational-platform.github.io/Class-12/class 10 button.html",
    class11: "https://gten-educational-platform.github.io/Class-12/Class 11 button.html",
    class12: "https://gten-educational-platform.github.io/Class-12/class 12 button.html",
    iitjee: "https://gten-educational-platform.github.io/Class-12/IIT JEE button.html",
    neet: "https://gten-educational-platform.github.io/Class-12/https://example.com/neet"
  };

  window.open(links[type], "_blank");
}

function goHome(){
  window.location.href = "https://www.g10educationalplatformindia.co.in/";
}











</script>


</body>
</html>
